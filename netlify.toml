# KayLive — Netlify Deployment Configuration
# Drop the kaylive_pro/ folder on netlify.com or connect Git repo

[build]
  publish = "."

# Redirects & rewrites
[[redirects]]
  from = "/privacy"
  to   = "/pages/privacy/collecte.html"
  status = 301

[[redirects]]
  from = "/support"
  to   = "/pages/support.html"
  status = 301

[[redirects]]
  from = "/blog"
  to   = "/pages/blog/streaming.html"
  status = 301

[[redirects]]
  from = "/legal"
  to   = "/pages/legal/mentions.html"
  status = 301

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"
